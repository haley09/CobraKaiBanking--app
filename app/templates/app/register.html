{% extends 'app/base.html' %}

{% block content %}
<div class="container py-5">
    <h2>Register</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Register</button>
    </form>

    <p class="text-center">
        If you already have an account,
        <a href="{% url 'app:login' %}">login</a> instead.
    </p>
</div>
{% endblock %}

{% extends 'app/base.html' %}

{% block content %}
<div class="container py-5">
    <h2>Login</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Login</button>
    </form>

    <p class="text-center">
        Don’t have an account?
        <a href="{% url 'app:register' %}">Register here</a>.
    </p>
</div>
{% endblock %}
